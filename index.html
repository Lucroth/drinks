<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MixBar 🍹 – Twój Domowy Barman</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #06060f;
      --card-bg: #0d0d22;
      --card-border: rgba(255, 255, 255, 0.07);
      --text: #e2e8f0;
      --muted: #64748b;
      --vodka-clr: #a78bfa;
      --rum-clr: #fbbf24;
      --noalco-clr: #34d399;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      text-align: center;
      padding: 72px 24px 52px;
      overflow: hidden;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #1c0a40 0%, var(--bg) 70%);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(167,139,250,.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(6,182,212,.10) 0%, transparent 50%);
      pointer-events: none;
    }
    .hero-emoji { font-size: 3.5rem; display: block; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 7vw, 4.5rem);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, #c4b5fd 0%, #67e8f9 50%, #f9a8d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }
    .hero p { color: var(--muted); font-size: 1.05rem; max-width: 480px; margin: 0 auto; line-height: 1.6; }

    /* ── FILTERS ── */
    .filters {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 18px 20px;
      flex-wrap: wrap;
      background: rgba(6, 6, 15, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .filter-btn {
      padding: 9px 22px;
      border-radius: 999px;
      border: 2px solid;
      background: transparent;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: all .25s ease;
    }
    .filter-btn[data-f="all"]    { border-color: #94a3b8; color: #94a3b8; }
    .filter-btn[data-f="vodka"]  { border-color: var(--vodka-clr); color: var(--vodka-clr); }
    .filter-btn[data-f="rum"]    { border-color: var(--rum-clr); color: var(--rum-clr); }
    .filter-btn[data-f="noalco"] { border-color: var(--noalco-clr); color: var(--noalco-clr); }

    .filter-btn.active,
    .filter-btn:hover { color: #04040e !important; }
    .filter-btn[data-f="all"].active,
    .filter-btn[data-f="all"]:hover    { background: #94a3b8; }
    .filter-btn[data-f="vodka"].active,
    .filter-btn[data-f="vodka"]:hover  { background: var(--vodka-clr); box-shadow: 0 0 22px rgba(167,139,250,.4); }
    .filter-btn[data-f="rum"].active,
    .filter-btn[data-f="rum"]:hover    { background: var(--rum-clr); box-shadow: 0 0 22px rgba(251,191,36,.4); }
    .filter-btn[data-f="noalco"].active,
    .filter-btn[data-f="noalco"]:hover { background: var(--noalco-clr); box-shadow: 0 0 22px rgba(52,211,153,.4); }

    /* ── GRID ── */
    .grid {
      max-width: 1240px;
      margin: 0 auto;
      padding: 44px 20px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(345px, 1fr));
      gap: 28px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      overflow: hidden;
      transition: transform .3s ease, box-shadow .3s ease;
      animation: fadeUp .4s ease both;
    }
    .card:hover { transform: translateY(-7px); box-shadow: 0 24px 64px rgba(0,0,0,.55); }
    .card.hidden { display: none !important; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    .card-body { padding: 26px 22px 18px; }
    .card-title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 6px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .card-badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .badge-vodka  { background: rgba(167,139,250,.92); color: #17002e; }
    .badge-rum    { background: rgba(251,191,36,.92);  color: #1c0f00; }
    .badge-noalco { background: rgba(52,211,153,.92);  color: #012515; }
    .card-desc { color: var(--muted); font-size: .88rem; line-height: 1.55; margin-bottom: 22px; }

    /* ── GLASS VIZ ── */
    .section-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .glass-row { display: flex; gap: 18px; align-items: flex-end; margin-bottom: 24px; }
    .glass-wrap { flex-shrink: 0; width: 58px; }
    .glass-body {
      height: 108px;
      width: 100%;
      border: 2px solid rgba(255,255,255,.18);
      border-top: none;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column-reverse;
      position: relative;
      background: rgba(255,255,255,.02);
    }
    .glass-rim {
      height: 8px;
      width: 110%;
      margin-left: -5%;
      border: 2px solid rgba(255,255,255,.18);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      margin-top: -1px;
    }
    .glass-shine {
      position: absolute;
      top: 0; left: 7px;
      width: 7px; height: 90%;
      background: linear-gradient(to bottom, rgba(255,255,255,.18), transparent);
      border-radius: 3px;
      pointer-events: none;
      z-index: 3;
    }
    .g-layer { width: 100%; position: relative; }
    .g-layer + .g-layer::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,.15);
    }
    .ice-dots {
      position: absolute;
      top: 6px; left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 5px;
      z-index: 4;
      pointer-events: none;
    }
    .ice-dot {
      width: 11px; height: 8px;
      background: rgba(255,255,255,.55);
      border-radius: 3px;
      box-shadow: inset 0 1px 2px rgba(255,255,255,.6);
    }

    .ing-legend { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .ing-row { display: flex; align-items: center; gap: 9px; font-size: .84rem; }
    .ing-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .ing-name { flex: 1; }
    .ing-amount { color: var(--muted); font-size: .78rem; white-space: nowrap; }

    /* ── STEPS ── */
    .steps { margin-bottom: 16px; }
    .steps ol { list-style: none; display: flex; flex-direction: column; gap: 9px; }
    .steps li { display: flex; align-items: flex-start; gap: 10px; font-size: .86rem; line-height: 1.45; }
    .step-n {
      min-width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,.09);
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }

    .card-meta {
      display: flex; gap: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.06);
      font-size: .78rem;
      color: var(--muted);
    }
    .card-meta span { display: flex; align-items: center; gap: 5px; }

    footer {
      text-align: center;
      padding: 28px 20px;
      color: var(--muted);
      font-size: .82rem;
      border-top: 1px solid rgba(255,255,255,.05);
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; padding: 24px 14px 40px; gap: 20px; }
      .filter-btn { font-size: .75rem; padding: 7px 16px; }
    }
  </style>
</head>

function buildGlass(ingredients) {
  const layers = ingredients.filter(i => !i.noLayer && i.parts > 0);
  const total  = layers.reduce((s, i) => s + i.parts, 0);
  const layerDivs = [...layers].reverse().map(i => {
    const pct = Math.round((i.parts / total) * 100);
    return `<div class="g-layer" style="height:${pct}%;background:${i.color};opacity:.88;"></div>`;
  }).join('');
  return `
    <div class="glass-wrap">
      <div class="glass-rim"></div>
      <div class="glass-body">
        <div class="glass-shine"></div>
        <div class="ice-dots"><div class="ice-dot"></div><div class="ice-dot"></div></div>
        ${layerDivs}
      </div>
    </div>`;
}

function buildCard(c) {
  const badgeClass = { vodka: 'badge-vodka', rum: 'badge-rum', noalco: 'badge-noalco' }[c.cat];
  const badgeText  = { vodka: '🥃 Wódka', rum: '🍬 Rum', noalco: '🌿 Bez alkoholu' }[c.cat];
  const legend = c.ingredients.map(i => `
    <div class="ing-row">
      <span class="ing-dot" style="background:${i.color}"></span>
      <span class="ing-name">${i.name}</span>
      <span class="ing-amount">${i.amount}</span>
    </div>`).join('');
  const steps = c.steps.map((s, idx) => `
    <li><span class="step-n">${idx + 1}</span>${s}</li>`).join('');
  return `
  <article class="card" data-cat="${c.cat}">
    <div class="card-body">
      <div class="card-title-row">
        <h2 class="card-title">${c.emoji} ${c.name}</h2>
        <span class="card-badge ${badgeClass}">${badgeText}</span>
      </div>
      <p class="card-desc">${c.desc}</p>
      <div class="glass-section">
        <div class="section-label">🥃 Jak to wygląda w szklance</div>
        <div class="glass-row">
          ${buildGlass(c.ingredients)}
          <div class="ing-legend">${legend}</div>
        </div>
      </div>
      <div class="steps">
        <div class="section-label">📋 Jak zrobić</div>
        <ol>${steps}</ol>
      </div>
      <div class="card-meta">
        <span>⏱ ${c.time}</span>
        <span>⭐ ${c.difficulty}</span>
      </div>
    </div>
  </article>`;
}

document.getElementById('grid').innerHTML = cocktails.map(buildCard).join('');

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const f = btn.dataset.f;
  document.querySelectorAll('.card').forEach((card, i) => {
    const show = f === 'all' || card.dataset.cat === f;
    card.classList.toggle('hidden', !show);
    if (show) card.style.animationDelay = `${i * 0.04}s`;
  });
});
